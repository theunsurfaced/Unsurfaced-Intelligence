# UNSURFACED(TM) API — Cloudflare Worker config
# Deployed via `wrangler deploy` from this /worker directory.
# This file is the source of truth for CODE + BINDINGS. A deploy from here
# restores everything the bot's static takeover stripped.
name = "unsurfaced-api"
main = "src/index.js"
compatibility_date = "2026-07-01"

# Custom domain route (keeps api.unsurfaced-intelligence.com pointed here)
routes = [
  { pattern = "api.unsurfaced-intelligence.com", custom_domain = true }
]

# ── Bindings (names must match what index.js reads) ─────────────────
[ai]
binding = "AI"                       # Workers AI — PLAY / EXCAVATE / MINE

[[r2_buckets]]
binding = "MEDIA"                    # generated images + study media
bucket_name = "unsurfaced-media"

[[kv_namespaces]]
binding = "RATE_LIMIT"               # per-user AI limits + arcade replay guard (arc:*)
id = "1641a0a61b554cc582cd79c7aed0aeb6"

# ── Observability ───────────────────────────────────────────────────
# `[observability] enabled = true` alone was present here and did NOT persist
# console.log output - only Cloudflare's own invocation records. The nested
# blocks below are the canonical form the dashboard itself emits, and they are
# what actually ingests custom logs. Without them, every console.log this
# worker wrote (spine_slice, spine_capture, edition_watchdog) was dropped at
# the door: correct code reporting into a channel that was switched off - the
# same disease as logEvent writing health to a table needing an admin JWT to
# read. Wrangler treats this file as source of truth, so a deploy WITHOUT
# these blocks silently reverts the dashboard toggle and blinds the pipeline.
[observability]
enabled = true

[observability.logs]
enabled = true
invocation_logs = true

[observability.traces]
enabled = true

# ── Secrets & vars: set in dashboard / via `wrangler secret put`,
#    NEVER in this file. Existing ones survive a wrangler deploy:
#    SUPABASE_URL, SUPABASE_ANON_KEY, SUPABASE_SERVICE_ROLE_KEY,
#    STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET, RESEND_API_KEY,
#    ALLOWED_ORIGINS, EMAIL_FROM, APP_URL,
#    LEADERBOARD_HMAC_SECRET  (add after this deploy)

# ── Cron: DAILY pipeline (06:00 UTC daily) ──────────────────────────
[triggers]
crons = ["*/30 * * * *", "15 5 * * *", "0 6 * * *"]
